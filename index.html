<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحة هبوط</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #ffffff;
    overflow-x: hidden;
}

/* خلفية متموجة */
.wave {
    position: fixed;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: radial-gradient(circle, rgba(0,200,120,0.08) 20%, transparent 70%);
    animation: waveMove 12s linear infinite;
}

@keyframes waveMove {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* الحاوية */
.container {
    position: relative;
    text-align: center;
    margin-top: 120px;
    padding: 20px;
}

/* الكرت */
.card {
    background: #fff;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    max-width: 400px;
    margin: auto;
}

/* النص */
.company {
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 10px;
}

.services {
    font-size: 16px;
    color: #555;
    margin-bottom: 30px;
}

/* زر الاتصال */
.call-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(135deg, #00c878, #00a860);
    color: #fff;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 14px;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
    position: relative;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,200,120,0.4);
    transition: 0.3s;
}

.call-btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 10px 25px rgba(0,200,120,0.6);
}

/* موجة داخل زر الاتصال */
.call-btn::before {
    content: "";
    position: absolute;
    width: 300%;
    height: 300%;
    background: rgba(255,255,255,0.15);
    top: -100%;
    left: -100%;
    border-radius: 50%;
    animation: pulse 2.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(0); opacity: 0.6; }
    100% { transform: scale(1); opacity: 0; }
}

/* زر واتساب */
.whatsapp-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #25D366;
    color: #fff;
    padding: 15px;
    border-radius: 14px;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(37,211,102,0.4);
    transition: 0.3s;
}

.whatsapp-btn:hover {
    background: #1ebe5d;
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 10px 25px rgba(37,211,102,0.6);
}

/* أيقونة واتساب */
.whatsapp-icon {
    width: 22px;
    height: 22px;
    fill: white;
}
</style>

</head>

<body>

<div class="wave"></div>

<div class="container">
    <div class="card">
        <div class="company">مؤسسة نمر طويق للتبريد والتكييف الرياض </div>
        <div class="services">صيانة مكيفات - تركيب مكيفات - غسيل جميع انواع المكيفات</div>

        <a href="tel:0534446527" class="call-btn">
            اتصال الآن
        </a>

        <a href="https://wa.me/966534446527" class="whatsapp-btn">
            <svg class="whatsapp-icon" viewBox="0 0 32 32">
                <path d="M16 0C7.16 0 0 7.16 0 16c0 2.82.74 5.57 2.14 7.99L0 32l8.27-2.14A15.94 15.94 0 0016 32c8.84 0 16-7.16 16-16S24.84 0 16 0zm0 29.5c-2.54 0-5.03-.66-7.2-1.92l-.52-.31-4.9 1.27 1.31-4.78-.34-.55A13.42 13.42 0 012.5 16C2.5 8.82 8.82 2.5 16 2.5S29.5 8.82 29.5 16 23.18 29.5 16 29.5zm7.23-10.3c-.4-.2-2.36-1.17-2.72-1.3-.36-.13-.62-.2-.88.2s-1.01 1.3-1.24 1.57c-.23.26-.46.3-.86.1-.4-.2-1.7-.62-3.24-1.98-1.2-1.07-2-2.4-2.24-2.8-.23-.4-.02-.62.18-.82.18-.18.4-.46.6-.7.2-.23.26-.4.4-.66.13-.26.07-.5-.03-.7-.1-.2-.88-2.12-1.2-2.9-.32-.78-.64-.68-.88-.7l-.75-.01c-.26 0-.7.1-1.07.5s-1.4 1.37-1.4 3.33 1.44 3.86 1.64 4.13c.2.26 2.83 4.32 6.86 6.05.96.42 1.7.66 2.28.84.96.3 1.84.26 2.54.16.78-.12 2.36-.96 2.7-1.88.33-.92.33-1.7.23-1.88-.1-.18-.36-.3-.76-.5z"/>
            </svg>
            واتساب
        </a>
    </div>
</div>

</body>
</html>
